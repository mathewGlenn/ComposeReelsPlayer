<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#111315">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header" aria-label="Primary navigation">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>{{ site.title }}</span>
      </a>
      <nav class="nav-links" aria-label="Site">
        <a href="#features">Features</a>
        <a href="#install">Install</a>
        <a href="#usage">Usage</a>
        <a href="{{ site.github.repository_url }}">GitHub</a>
      </nav>
    </header>

    <main id="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Built for Kotlin, Jetpack Compose, and Media3.</p>
      <a href="{{ site.github.repository_url }}">View source</a>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
